<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="duskSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b2359"/>
      <stop offset="45%" stop-color="#5b3d78"/>
      <stop offset="75%" stop-color="#a85c8a"/>
      <stop offset="100%" stop-color="#f4b6c2"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff8e0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lantern" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8a5b"/>
      <stop offset="100%" stop-color="#ff5b5b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#duskSky)"/>

  <!-- twinkling stars -->
  <g fill="#fff8e0">
    <circle cx="80" cy="40" r="1.8"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="70" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="35" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="60" r="1.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="45" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="80" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="50" r="1.8"><animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="30" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="770" cy="65" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- moon -->
  <circle cx="1020" cy="60" r="55" fill="url(#moonGlow)"/>
  <circle cx="1020" cy="60" r="26" fill="#fff8e0"/>
  <circle cx="1032" cy="52" r="24" fill="#5b3d78"/>

  <!-- torii gate silhouette -->
  <g fill="#2a1520">
    <rect x="150" y="130" width="900" height="16" rx="3"/>
    <rect x="150" y="158" width="900" height="9" rx="2"/>
    <rect x="230" y="140" width="22" height="160"/>
    <rect x="748" y="140" width="22" height="160"/>
    <rect x="470" y="167" width="16" height="60"/>
  </g>

  <!-- lanterns hanging under the beam -->
  <g>
    <line x1="330" y1="167" x2="330" y2="190" stroke="#2a1520" stroke-width="2"/>
    <ellipse cx="330" cy="210" rx="20" ry="24" fill="url(#lantern)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="322" y="188" width="16" height="6" fill="#4a2a20"/>

    <line x1="600" y1="167" x2="600" y2="192" stroke="#2a1520" stroke-width="2"/>
    <ellipse cx="600" cy="214" rx="22" ry="26" fill="url(#lantern)">
      <animate attributeName="opacity" values="1;0.8;1" dur="2.4s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="591" y="190" width="18" height="6" fill="#4a2a20"/>

    <line x1="870" y1="167" x2="870" y2="190" stroke="#2a1520" stroke-width="2"/>
    <ellipse cx="870" cy="210" rx="20" ry="24" fill="url(#lantern)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="862" y="188" width="16" height="6" fill="#4a2a20"/>
  </g>

  <!-- distant hills -->
  <path d="M0,300 Q150,260 300,295 T600,290 T900,300 T1200,285 L1200,320 L0,320 Z" fill="#3a1f3d" opacity="0.85"/>

  <!-- falling sakura petals -->
  <g fill="#ffc4d6">
    <circle r="4"><animateMotion path="M100,0 C120,80 60,160 100,320" dur="6s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M300,0 C280,90 340,180 300,320" dur="7s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion path="M550,0 C580,100 520,200 550,320" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M800,0 C770,110 830,210 800,320" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion path="M1050,0 C1080,90 1020,190 1050,320" dur="7.5s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M950,0 C930,100 980,200 950,320" dur="6.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>
