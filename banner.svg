<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8ec9f0"/>
      <stop offset="55%" stop-color="#b3ddf7"/>
      <stop offset="100%" stop-color="#eaf6fd"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="35" r="2.2"/>
    <circle cx="140" cy="60" r="1.6"/>
    <circle cx="230" cy="25" r="1.8"/>
    <circle cx="330" cy="50" r="2"/>
    <circle cx="470" cy="30" r="1.6"/>
    <circle cx="600" cy="20" r="2.2"/>
    <circle cx="700" cy="45" r="1.6"/>
    <circle cx="820" cy="28" r="2"/>
    <circle cx="920" cy="55" r="1.8"/>
    <circle cx="1010" cy="22" r="2.2"/>
    <circle cx="1100" cy="48" r="1.6"/>
    <circle cx="1150" cy="20" r="2"/>
    <circle cx="90" cy="90" r="1.4"/>
    <circle cx="980" cy="80" r="1.4"/>
    <circle cx="500" cy="70" r="1.4"/>
  </g>

  <!-- sun glow, subtle -->
  <circle cx="1080" cy="70" r="34" fill="#ffffff" opacity="0.35"/>
  <circle cx="1080" cy="70" r="20" fill="#ffffff" opacity="0.55"/>

  <!-- clouds -->
  <g fill="#ffffff" opacity="0.9" filter="url(#soft)">
    <!-- cloud 1 -->
    <ellipse cx="150" cy="140" rx="55" ry="26"/>
    <ellipse cx="195" cy="128" rx="40" ry="22"/>
    <ellipse cx="100" cy="132" rx="38" ry="20"/>
    <ellipse cx="150" cy="118" rx="45" ry="24"/>

    <!-- cloud 2 -->
    <ellipse cx="430" cy="190" rx="70" ry="30"/>
    <ellipse cx="490" cy="175" rx="45" ry="24"/>
    <ellipse cx="370" cy="178" rx="42" ry="22"/>
    <ellipse cx="430" cy="165" rx="55" ry="26"/>

    <!-- cloud 3 -->
    <ellipse cx="760" cy="120" rx="60" ry="26"/>
    <ellipse cx="810" cy="108" rx="40" ry="20"/>
    <ellipse cx="710" cy="112" rx="38" ry="18"/>
    <ellipse cx="760" cy="98" rx="46" ry="22"/>

    <!-- cloud 4 -->
    <ellipse cx="1000" cy="200" rx="65" ry="28"/>
    <ellipse cx="1055" cy="188" rx="42" ry="22"/>
    <ellipse cx="945" cy="190" rx="40" ry="20"/>
    <ellipse cx="1000" cy="175" rx="50" ry="24"/>

    <!-- small drifting cloud -->
    <ellipse cx="260" cy="220" rx="35" ry="15"/>
    <ellipse cx="290" cy="212" rx="24" ry="12"/>
    <ellipse cx="235" cy="215" rx="22" ry="11"/>
  </g>
</svg>
